name: Scrape Cian

on:
  schedule:
    - cron: '0 3,9,15,21 * * *'   # каждые 6 часов: 03:00, 09:00, 15:00, 21:00 UTC
  workflow_dispatch:                # запуск вручную из GitHub Actions

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: node scraper.js
        env:
          SCRAPER_DELAY: 1200

      - name: Check results
        id: check
        run: |
          if [ ! -f data/properties.json ]; then
            echo "count=0" >> $GITHUB_OUTPUT
            echo "⚠️ No data file — Cian may be blocking this IP"
          else
            COUNT=$(node -e "const d=require('./data/properties.json'); console.log(d.totalCount)")
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "✅ Scraped $COUNT properties"
          fi

      - name: Commit & push data
        if: ${{ steps.check.outputs.count > 50 }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/properties.json
          git diff --staged --quiet || git commit -m "chore: scrape update $(date -u '+%Y-%m-%d %H:%M UTC') — ${{ steps.check.outputs.count }} props"
          git push

      - name: Trigger Vercel redeploy
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -s -X POST "$VERCEL_DEPLOY_HOOK"
          fi
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
